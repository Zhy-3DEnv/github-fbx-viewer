<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>FBX 3D Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background-color: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #aaa; font-size: 16px; pointer-events: none;
        }
        #info {
            position: absolute; bottom: 16px; left: 50%;
            transform: translateX(-50%);
            color: #666; font-size: 12px; pointer-events: none;
        }
        #toolbar {
            position: absolute; bottom: 16px; left: 16px;
            display: flex; gap: 8px; z-index: 10;
        }
        #toolbar button {
            background: rgba(255,255,255,0.1); color: #ccc;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px; padding: 6px 14px;
            font-size: 13px; cursor: pointer;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
        }
        #toolbar button:hover { background: rgba(255,255,255,0.2); color: #fff; }
        #toolbar button.active { background: rgba(255,255,255,0.25); color: #fff; border-color: rgba(255,255,255,0.4); }
    </style>
</head>
<body>
    <div id="loading">正在下载并解析 FBX 模型...</div>
    <div id="info">鼠标左键旋转 | 滚轮缩放 | 右键平移</div>
    <div id="canvas-container"></div>
    <div id="toolbar">
        <button id="btn-grid" class="active" title="切换网格显示">网格</button>
    </div>

    <script src="three.min.js"></script>
    <script src="fflate.min.js"></script>
    <script src="FBXLoader.js"></script>
    <script src="OrbitControls.js"></script>
    <script src="viewer.js"></script>
</body>
</html>
